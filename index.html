<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Founder OS</title>
<style>
  :root{
    --bg:#0B0D10;
    --bg-elevated:#10131A;
    --panel:rgba(255,255,255,0.035);
    --panel-solid:#14171D;
    --panel-border:rgba(255,255,255,0.075);
    --panel-hover:rgba(255,255,255,0.06);
    --text:#E8EAED;
    --text-dim:#8B92A0;
    --text-faint:#565D6B;
    --accent:#C9963D;
    --accent-hi:#E0B565;
    --accent-soft:rgba(201,150,61,0.14);
    --teal:#45C4B0;
    --teal-soft:rgba(69,196,176,0.14);
    --good:#6EE7A8;
    --good-soft:rgba(110,231,168,0.14);
    --bad:#E5484D;
    --bad-soft:rgba(229,72,77,0.14);
    --info:#6C9BE0;
    --info-soft:rgba(108,155,224,0.14);
    --radius-sm:8px;
    --radius:12px;
    --radius-lg:16px;
    --mono:ui-monospace,"SF Mono","JetBrains Mono","Fira Code",Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,"Helvetica Neue",Arial,sans-serif;
    --sidebar-w:230px;
    --strip-h:44px;
    --ease:cubic-bezier(.22,.9,.32,1);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--sans);
    font-size:14px;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
  }
  body::before{
    content:"";
    position:fixed; inset:0;
    background:
      radial-gradient(1200px 600px at 85% -10%, rgba(201,150,61,0.07), transparent 60%),
      radial-gradient(900px 500px at -10% 100%, rgba(69,196,176,0.06), transparent 60%);
    pointer-events:none;
    z-index:0;
  }
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:8px;border:2px solid transparent;background-clip:padding-box}
  ::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.15);background-clip:padding-box}
  a{color:inherit}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:13px;color:var(--text)}
  :focus-visible{outline:2px solid var(--teal);outline-offset:2px;border-radius:4px}

  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
  .dim{color:var(--text-dim)}
  .faint{color:var(--text-faint)}
  .flex{display:flex}
  .between{justify-content:space-between}
  .center{align-items:center}
  .gap-1{gap:6px} .gap-2{gap:10px} .gap-3{gap:16px} .gap-4{gap:24px}
  .wrap{flex-wrap:wrap}
  .grow{flex:1 1 auto}
  .hidden{display:none !important}

  /* ---------- App shell ---------- */
  #app{position:relative;z-index:1;display:flex;height:100vh;width:100vw}

  #sidebar{
    width:var(--sidebar-w);
    flex:0 0 auto;
    background:var(--bg-elevated);
    border-right:1px solid var(--panel-border);
    display:flex;
    flex-direction:column;
    transition:transform .25s var(--ease);
  }
  .brand{
    display:flex;align-items:center;gap:10px;
    padding:18px 18px 14px;
    font-weight:600;letter-spacing:.2px;font-size:14.5px;
  }
  .brand .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent)}
  .brand small{display:block;color:var(--text-faint);font-weight:400;font-size:11px;margin-top:1px}

  #nav{flex:1;overflow-y:auto;padding:6px 10px}
  .nav-item{
    display:flex;align-items:center;gap:10px;
    padding:8px 10px;margin:1px 0;
    border-radius:var(--radius-sm);
    color:var(--text-dim);
    font-size:13px;font-weight:500;
    cursor:pointer;
    transition:background .15s var(--ease),color .15s var(--ease);
    user-select:none;
    position:relative;
  }
  .nav-item svg{flex:0 0 auto;opacity:.85}
  .nav-item:hover{background:var(--panel-hover);color:var(--text)}
  .nav-item.active{background:var(--accent-soft);color:var(--accent-hi)}
  .nav-item.active svg{opacity:1}
  .nav-key{
    margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--text-faint);
    border:1px solid var(--panel-border);border-radius:4px;padding:1px 5px;
  }
  .nav-section-label{
    font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-faint);
    padding:14px 10px 6px;font-weight:600;
  }
  .sidebar-foot{padding:12px;border-top:1px solid var(--panel-border);font-size:11px;color:var(--text-faint)}

  #sidebar-toggle{display:none}

  /* ---------- Main / instrument strip ---------- */
  #main{flex:1;display:flex;flex-direction:column;min-width:0}
  #strip{
    height:var(--strip-h);flex:0 0 auto;
    display:flex;align-items:center;gap:22px;
    padding:0 20px;
    background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,0));
    border-bottom:1px solid var(--panel-border);
    font-family:var(--mono);font-size:12px;
    overflow-x:auto;white-space:nowrap;
  }
  .strip-item{display:flex;align-items:center;gap:7px;color:var(--text-dim)}
  .strip-dot{width:6px;height:6px;border-radius:50%;background:var(--teal);box-shadow:0 0 6px var(--teal)}
  .strip-dot.amber{background:var(--accent);box-shadow:0 0 6px var(--accent)}
  .strip-dot.red{background:var(--bad);box-shadow:0 0 6px var(--bad)}
  .strip-val{color:var(--text);font-weight:600}
  .strip-sep{color:var(--panel-border)}
  #menu-btn{display:none;background:none;border:none;color:var(--text-dim);padding:6px}

  #view-root{flex:1;overflow-y:auto;padding:26px 30px 60px}
  .view-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap}
  .view-title{font-size:20px;font-weight:650;letter-spacing:-.2px}
  .view-sub{color:var(--text-dim);font-size:12.5px;margin-top:3px}

  /* ---------- Buttons ---------- */
  .btn{
    display:inline-flex;align-items:center;gap:6px;
    padding:8px 14px;border-radius:var(--radius-sm);
    border:1px solid var(--panel-border);background:var(--panel);
    color:var(--text);font-size:12.5px;font-weight:600;
    transition:all .15s var(--ease);
  }
  .btn:hover{background:var(--panel-hover);border-color:rgba(255,255,255,.14)}
  .btn-primary{background:var(--accent);border-color:var(--accent);color:#181207}
  .btn-primary:hover{background:var(--accent-hi);border-color:var(--accent-hi)}
  .btn-ghost{background:transparent;border-color:transparent}
  .btn-ghost:hover{background:var(--panel-hover)}
  .btn-danger{color:var(--bad)}
  .btn-danger:hover{background:var(--bad-soft);border-color:rgba(229,72,77,.3)}
  .btn-sm{padding:5px 10px;font-size:11.5px}
  .btn-icon{padding:7px;border-radius:var(--radius-sm)}
  .btn:disabled{opacity:.4;cursor:not-allowed}

  /* ---------- Panels / cards ---------- */
  .panel{
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:var(--radius);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
  }
  .panel-pad{padding:18px}
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;margin-bottom:22px}
  .kpi{
    padding:16px 16px 14px;position:relative;overflow:hidden;
    animation:rise .35s var(--ease) backwards;
  }
  .kpi-label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em;font-weight:600;display:flex;align-items:center;gap:6px;margin-bottom:10px}
  .kpi-value{font-family:var(--mono);font-size:26px;font-weight:600;letter-spacing:-.5px}
  .kpi-value .unit{font-size:13px;color:var(--text-dim);font-weight:500;margin-left:3px}
  .kpi-sub{font-size:11.5px;color:var(--text-faint);margin-top:6px}
  .kpi-sub.good{color:var(--good)} .kpi-sub.bad{color:var(--bad)} .kpi-sub.amber{color:var(--accent-hi)}
  .kpi-bar{height:5px;border-radius:4px;background:rgba(255,255,255,.06);margin-top:10px;overflow:hidden}
  .kpi-bar > span{display:block;height:100%;background:var(--teal);border-radius:4px;transition:width .5s var(--ease)}
  .kpi:hover{background:var(--panel-hover);cursor:pointer}

  .section{margin-bottom:26px}
  .section-title{font-size:13px;font-weight:650;margin-bottom:12px;display:flex;align-items:center;gap:8px}
  .section-title .cnt{font-family:var(--mono);color:var(--text-faint);font-weight:500;font-size:11.5px}

  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  @media (max-width:900px){.grid-2,.grid-3{grid-template-columns:1fr}}

  /* ---------- Insight / callout ---------- */
  .callout{
    display:flex;gap:12px;padding:13px 15px;border-radius:var(--radius);
    border:1px solid var(--panel-border);background:var(--panel);margin-bottom:10px;
    font-size:12.5px;align-items:flex-start;
  }
  .callout .ic{flex:0 0 auto;margin-top:1px}
  .callout.warn{border-color:rgba(201,150,61,.35);background:var(--accent-soft)}
  .callout.bad{border-color:rgba(229,72,77,.35);background:var(--bad-soft)}
  .callout.good{border-color:rgba(110,231,168,.3);background:var(--good-soft)}
  .callout.info{border-color:rgba(108,155,224,.3);background:var(--info-soft)}
  .callout b{font-weight:650}

  /* ---------- Forms ---------- */
  .field{display:flex;flex-direction:column;gap:5px}
  .field label{font-size:11px;color:var(--text-dim);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
  .field input[type=text],.field input[type=number],.field input[type=date],.field input[type=time],
  .field input[type=email],.field input[type=url],.field select,.field textarea{
    background:var(--bg-elevated);border:1px solid var(--panel-border);border-radius:var(--radius-sm);
    padding:8px 10px;color:var(--text);width:100%;
  }
  .field textarea{resize:vertical;min-height:60px;font-family:var(--sans)}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--teal)}
  .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;align-items:end}
  .field.wide{grid-column:1/-1}
  .form-row{display:flex;gap:10px;flex-wrap:wrap;align-items:end}
  .inline-form{padding:14px;margin-bottom:16px}

  input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:4px;background:rgba(255,255,255,.1);outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:var(--teal);border:2px solid var(--bg);cursor:pointer;box-shadow:0 0 0 1px var(--teal)}
  input[type=range]::-moz-range-thumb{width:15px;height:15px;border-radius:50%;background:var(--teal);border:2px solid var(--bg);cursor:pointer}
  .slider-row{display:flex;align-items:center;gap:12px}
  .slider-row .sval{font-family:var(--mono);width:24px;text-align:right;color:var(--teal);font-weight:600}

  input[type=checkbox]{width:16px;height:16px;accent-color:var(--teal)}

  .pill-select{display:flex;gap:6px;flex-wrap:wrap}
  .pill-opt{padding:5px 11px;border-radius:20px;border:1px solid var(--panel-border);font-size:11.5px;color:var(--text-dim);cursor:pointer;transition:all .15s}
  .pill-opt.on{background:var(--teal-soft);border-color:rgba(69,196,176,.4);color:var(--teal)}

  /* ---------- Tables ---------- */
  table.data{width:100%;border-collapse:collapse;font-size:12.5px}
  table.data th{
    text-align:left;color:var(--text-faint);font-weight:600;font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;
    padding:8px 12px;border-bottom:1px solid var(--panel-border);white-space:nowrap;
  }
  table.data td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.045);vertical-align:middle}
  table.data tr:last-child td{border-bottom:none}
  table.data tr:hover td{background:rgba(255,255,255,.02)}
  .row-actions{display:flex;gap:4px;opacity:0;transition:opacity .15s}
  table.data tr:hover .row-actions{opacity:1}

  .badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
  .badge.b-good{background:var(--good-soft);color:var(--good)}
  .badge.b-bad{background:var(--bad-soft);color:var(--bad)}
  .badge.b-amber{background:var(--accent-soft);color:var(--accent-hi)}
  .badge.b-info{background:var(--info-soft);color:var(--info)}
  .badge.b-dim{background:rgba(255,255,255,.06);color:var(--text-dim)}

  .empty{
    text-align:center;padding:38px 20px;color:var(--text-faint);font-size:12.5px;
    border:1px dashed var(--panel-border);border-radius:var(--radius);
  }
  .empty b{display:block;color:var(--text-dim);font-size:13px;margin-bottom:4px;font-weight:600}

  /* ---------- Kanban ---------- */
  .kanban{display:flex;gap:12px;overflow-x:auto;padding-bottom:10px;align-items:flex-start}
  .kcol{flex:0 0 240px;background:var(--panel);border:1px solid var(--panel-border);border-radius:var(--radius);padding:10px;min-height:120px;display:flex;flex-direction:column}
  .kcol.over{border-color:var(--teal);background:var(--teal-soft)}
  .kcol-head{display:flex;justify-content:space-between;align-items:center;font-size:11.5px;font-weight:650;color:var(--text-dim);padding:4px 4px 10px;text-transform:uppercase;letter-spacing:.04em}
  /* The drop target is .kcol-body, so it must keep height even when empty —
     without this an empty column cannot receive a card at all. */
  .kcol-body{flex:1;min-height:56px;border-radius:var(--radius-sm)}
  .kcol.over .kcol-body{outline:1px dashed var(--teal);outline-offset:-3px}
  .kcard{
    background:var(--panel-solid);border:1px solid var(--panel-border);border-radius:var(--radius-sm);
    padding:10px 11px;margin-bottom:8px;font-size:12.5px;cursor:grab;
    transition:transform .12s,box-shadow .12s;
  }
  .kcard:active{cursor:grabbing}
  .kcard.dragging{opacity:.4}
  .kcard:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,0,0,.35)}
  .kcard .ktitle{font-weight:600;margin-bottom:5px}
  .kcard .kmeta{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .kcard .kmove{display:flex;gap:2px;margin-left:auto}
  .kcard .kmove button{
    background:transparent;border:1px solid var(--panel-border);color:var(--text-faint);
    border-radius:5px;width:20px;height:20px;line-height:1;font-size:11px;cursor:pointer;padding:0;
  }
  .kcard .kmove button:hover:not(:disabled){color:var(--text);border-color:var(--teal)}
  .kcard .kmove button:disabled{opacity:.25;cursor:default}
  .empty-col-hint{color:var(--text-faint);font-size:11px;text-align:center;padding:14px 4px;pointer-events:none}

  /* ---------- Calendar ---------- */
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .cal-dow{font-size:10.5px;color:var(--text-faint);text-align:center;padding-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
  .cal-cell{
    min-height:78px;border-radius:var(--radius-sm);border:1px solid var(--panel-border);background:var(--panel);
    padding:6px;font-size:11px;cursor:pointer;transition:background .15s;
  }
  .cal-cell:hover{background:var(--panel-hover)}
  .cal-cell.other{opacity:.35}
  .cal-cell.today{border-color:var(--teal)}
  .cal-daynum{font-family:var(--mono);color:var(--text-dim);margin-bottom:4px}
  .cal-evt{background:var(--accent-soft);color:var(--accent-hi);border-radius:4px;padding:1px 5px;margin-bottom:2px;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cal-evt.red{background:var(--bad-soft);color:var(--bad)}
  .cal-evt.teal{background:var(--teal-soft);color:var(--teal)}

  /* ---------- Rings / sparklines ---------- */
  .ring-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center}
  .ring-label{position:absolute;font-family:var(--mono);font-weight:600;font-size:13px}

  /* ---------- Modal ---------- */
  #modal-root{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;background:rgba(5,6,8,.6);backdrop-filter:blur(3px)}
  #modal-root.open{display:flex}
  .modal-box{
    background:var(--bg-elevated);border:1px solid var(--panel-border);border-radius:var(--radius-lg);
    width:min(480px,92vw);max-height:86vh;overflow-y:auto;padding:22px;
    animation:pop .18s var(--ease);
  }
  .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
  .modal-head h3{font-size:15px;font-weight:650}

  /* ---------- Toast ---------- */
  #toast-root{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:60;display:flex;flex-direction:column;gap:8px;align-items:center}
  .toast{
    background:var(--panel-solid);border:1px solid var(--panel-border);border-radius:20px;
    padding:9px 16px;font-size:12px;box-shadow:0 8px 24px rgba(0,0,0,.4);
    animation:toastIn .2s var(--ease);display:flex;align-items:center;gap:8px;
  }

  /* ---------- Journal / vision / planner specifics ---------- */
  .planner-day{margin-bottom:14px}
  .planner-day h4{font-size:12px;color:var(--text-dim);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em;display:flex;gap:8px;align-items:center}
  .pblock{
    display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius-sm);
    background:var(--panel);border:1px solid var(--panel-border);margin-bottom:6px;cursor:grab;
  }
  .pblock.done{opacity:.5;text-decoration:line-through}
  .pblock .time{font-family:var(--mono);color:var(--teal);font-size:11.5px;flex:0 0 auto;width:46px}
  .pblock .lock{color:var(--text-faint)}

  .journal-entry{padding:14px 16px;margin-bottom:10px;cursor:pointer}
  .journal-entry h4{font-size:13px;font-weight:650;margin-bottom:3px}
  .journal-entry p{font-size:12px;color:var(--text-dim);white-space:pre-wrap;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  .journal-tag{font-size:10px;color:var(--text-faint);font-family:var(--mono)}

  .vision-grid{display:grid;grid-template-columns:120px repeat(3,1fr);gap:8px}
  .vision-grid .vh{font-size:11px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.05em;padding:8px 4px}
  .vision-cell{background:var(--panel);border:1px solid var(--panel-border);border-radius:var(--radius-sm);padding:8px}
  .vision-cell textarea{width:100%;background:transparent;border:none;resize:none;min-height:52px;font-size:12px;color:var(--text)}
  @media (max-width:800px){.vision-grid{grid-template-columns:1fr}.vision-grid .vh:first-child{display:none}}

  .timer-display{font-family:var(--mono);font-size:64px;font-weight:600;text-align:center;letter-spacing:-1px;margin:10px 0}
  .timer-ring{display:flex;justify-content:center;margin:16px 0}

  .deep-project-tag{font-size:10.5px;padding:2px 8px;border-radius:12px;background:var(--panel-hover);color:var(--text-dim)}

  /* ---------- Animations ---------- */
  @keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  @keyframes pop{from{opacity:0;transform:scale(.96) translateY(4px)}to{opacity:1;transform:scale(1) translateY(0)}}
  @keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .view-fade{animation:viewFade .22s var(--ease)}
  @keyframes viewFade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001ms !important;transition-duration:.001ms !important}
  }

  /* ---------- Responsive ---------- */
  @media (max-width:880px){
    :root{--sidebar-w:210px}
    #sidebar{position:fixed;top:0;bottom:0;left:0;z-index:40;transform:translateX(-100%);box-shadow:0 0 40px rgba(0,0,0,.5)}
    #sidebar.open{transform:translateX(0)}
    #menu-btn{display:block}
    #view-root{padding:18px 16px 50px}
    .kpi-grid{grid-template-columns:repeat(2,1fr)}
    #strip{gap:14px}
  }
  @media (max-width:480px){
    .kpi-grid{grid-template-columns:1fr 1fr}
    .timer-display{font-size:48px}
  }
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="brand"><span class="dot"></span><div>Founder OS<small>local &middot; offline &middot; yours</small></div></div>
    <nav id="nav"></nav>
    <div class="sidebar-foot mono">v1.0 &middot; <span id="storage-indicator">checking storage</span></div>
  </aside>
  <div id="main">
    <div id="strip">
      <button id="menu-btn" aria-label="Toggle menu">

/* ============================================================
   STORAGE LAYER

   Three backends, picked once at boot in this order:
     1. window.storage — the Anthropic artifact host, when running there.
     2. localStorage   — any normal browser: file://, GitHub Pages, etc.
     3. memory         — private mode or blocked cookies. Session only.

   The original build assumed backend 1 unconditionally, so every save threw
   outside the artifact host and nothing survived a reload.
   ============================================================ */
const LS_PREFIX = 'founder-os:';
const Backend = (function(){
  if (typeof window.storage === 'object' && window.storage &&
      typeof window.storage.get === 'function' && typeof window.storage.set === 'function') {
    return {
      name: 'host',
      async get(k){ const r = await window.storage.get(k, false); return (r && r.value) ? r.value : null; },
      async set(k, v){ await window.storage.set(k, v, false); return true; }
    };
  }
  try {
    const probe = LS_PREFIX + '__probe';
    window.localStorage.setItem(probe, '1');
    window.localStorage.removeItem(probe);
    return {
      name: 'local',
      async get(k){ return window.localStorage.getItem(LS_PREFIX + k); },
      async set(k, v){ window.localStorage.setItem(LS_PREFIX + k, v); return true; }
    };
  } catch(e){
    const mem = {};
    return {
      name: 'memory',
      async get(k){ return mem[k] != null ? mem[k] : null; },
      async set(k, v){ mem[k] = v; return true; }
    };
  }
})();

const Store = {
  cache: {},
  async load(key, fallback){
    try{
      const raw = await Backend.get(key);
      const val = raw ? JSON.parse(raw) : fallback;
      Store.cache[key] = val;
      return val;
    }catch(e){
      Store.cache[key] = fallback;
      return fallback;
    }
  },
  warned:false,
  async save(key, value){
    Store.cache[key] = value;
    try{
      await Backend.set(key, JSON.stringify(value));
      setStorageIndicator(true);
      return true;
    }catch(e){
      setStorageIndicator(false);
      if(!Store.warned){
        Store.warned=true;
        toast('Storage is full or blocked — changes last this session only. Export from Settings to keep them.','bad');
      }
      return false;
    }
  },
  get(key){ return Store.cache[key]; }
};
function setStorageIndicator(ok){
  const el = document.getElementById('storage-indicator');
  if(!el) return;
  if(!ok){ el.textContent = 'save failed'; el.style.color = 'var(--bad)'; return; }
  el.textContent = Backend.name === 'memory' ? 'session only' : 'saved';
  el.style.color = Backend.name === 'memory' ? 'var(--bad)' : 'var(--text-faint)';
}

function fmtDateShort(iso){ if(!iso) return '—'; const d=new Date(iso+'T00:00:00'); if(isNaN(d)) return '—'; return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
function daysUntil(iso){ if(!iso) return null; const d=new Date(iso+'T00:00:00'); if(isNaN(d)) return null; const now=new Date(); now.setHours(0,0,0,0); return Math.round((d-now)/86400000); }
function monthsBetween(iso1, iso2){ if(!iso1||!iso2) return null; const a=new Date(iso1+'T00:00:00'), b=new Date(iso2+'T00:00:00'); if(isNaN(a)||isNaN(b)) return null; return Math.round(((b-a)/(1000*60*60*24*30.44))*10)/10; }
function clamp(n,min,max){ return Math.max(min,Math.min(max,n)); }
function escapeHtml(s){ return (s==null?'':String(s)).replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
function debounce(fn, ms){ let t; return function(){ const a=arguments, ctx=this; clearTimeout(t); t=setTimeout(function(){ fn.apply(ctx,a); }, ms); }; }
function sum(arr, fn){ return arr.reduce(function(s,x){ return s+(fn?(Number(fn(x))||0):(Number(x)||0)); },0); }
function avg(arr, fn){ return arr.length ? sum(arr,fn)/arr.length : 0; }
function mondayOf(dateStr){
  const d = dateStr ? new Date(dateStr+'T00:00:00') : new Date();
  const day = d.getDay();
  const diff = d.getDate() - day + (day===0?-6:1);
  const monday = new Date(d); monday.setDate(diff);
  return monday.toISOString().slice(0,10);
}
function monthKey(dateStr){ const d = dateStr? new Date(dateStr+'T00:00:00') : new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }

function toast(msg, kind){

}

/* ============================================================

function svgSparkline(values, w, h, color){
  w=w||260; h=h||44; color=color||'var(--teal)';
  values = (values||[]).map(Number).filter(function(v){return !isNaN(v);});
  if(!values.length) return '<div class="faint mono" style="font-size:11px">no data yet</div>';
  const max=Math.max.apply(null,values), min=Math.min.apply(null,values);
  const range=(max-min)||1;
  const step = values.length>1 ? (w-8)/(values.length-1) : 0;
  const pts = values.map(function(v,i){
    const x = 4+i*step;
    const y = h-6-((v-min)/range)*(h-14);
    return x.toFixed(1)+','+y.toFixed(1);
  }).join(' ');
  const lastPt = pts.split(' ').pop().split(',');
  return '<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'">'+
    '<polyline points="'+pts+'" fill="none" stroke="'+color+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>'+
    '<circle cx="'+lastPt[0]+'" cy="'+lastPt[1]+'" r="3" fill="'+color+'"/></svg>';
}
function svgBars(values, labels, w, h, color){
  w=w||260; h=h||84; color=color||'var(--teal)';
  values = (values||[]).map(Number);
  if(!values.length) return '<div class="faint mono" style="font-size:11px">no data yet</div>';
  const max = Math.max.apply(null, values.concat([1]));
  const gap=5, bw=(w-(values.length-1)*gap)/values.length;
  let bars='';
  values.forEach(function(v,i){
    const bh=Math.max(2,(Math.max(v,0)/max)*(h-18));
    const x=i*(bw+gap), y=h-18-bh;
    bars += '<rect x="'+x.toFixed(1)+'" y="'+y.toFixed(1)+'" width="'+Math.max(2,bw).toFixed(1)+'" height="'+bh.toFixed(1)+'" rx="3" fill="'+color+'"/>';
  });
  let lbls='';
  if(labels){ labels.forEach(function(l,i){ const x=i*(bw+gap)+bw/2; lbls += '<text x="'+x.toFixed(1)+'" y="'+(h-4)+'" font-size="9" fill="var(--text-faint)" text-anchor="middle">'+escapeHtml(String(l))+'</text>'; }); }
  return '<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'">'+bars+lbls+'</svg>';
}
function svgRing(pct, size, color, label){
  size=size||62; color=color||'var(--teal)';
  pct=clamp(Number(pct)||0,0,100);
  const r=size/2-6, c=2*Math.PI*r, off=c-(pct/100)*c;
  return '<div class="ring-wrap">'+
    '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">'+
    '<circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="6"/>'+
    '<circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" fill="none" stroke="'+color+'" stroke-width="6" stroke-linecap="round" '+
    'stroke-dasharray="'+c.toFixed(1)+'" stroke-dashoffset="'+off.toFixed(1)+'" transform="rotate(-90 '+size/2+' '+size/2+')" style="transition:stroke-dashoffset .5s var(--ease)"/>'+
    '</svg><span class="ring-label">'+(label!=null?label:Math.round(pct)+'%')+'</span></div>';
}

function colorForStatus(val){
  const v=(val||'').toLowerCase();
  if(/live|done|complete|good|active|offer|accepted|paid|high|continue|double down/.test(v)) return 'b-good';
  if(/block|reject|fail|overdue|critical|stop|low\b/.test(v)) return 'b-bad';
  if(/wait|pending|prep|progress|interview|review|medium|pivot/.test(v)) return 'b-amber';
  if(/applied|submitted|planned|backlog/.test(v)) return 'b-info';
  return 'b-dim';
}
function fieldInputHtml(f, val){
  val = (val==null) ? '' : val;
  if(f.type==='select'){
    return '<select data-f="'+f.key+'">'+(f.options||[]).map(function(o){return '<option value="'+escapeHtml(o)+'" '+(o===val?'selected':'')+'>'+escapeHtml(o)+'</option>';}).join('')+'</select>';
  }
  if(f.type==='textarea'){
    return '<textarea data-f="'+f.key+'" placeholder="'+escapeHtml(f.ph||f.label)+'">'+escapeHtml(val)+'</textarea>';
  }
  if(f.type==='range'){
    const v = val===''? (f.min||1) : val;
    return '<div class="slider-row"><input type="range" min="'+(f.min||1)+'" max="'+(f.max||10)+'" step="1" data-f="'+f.key+'" value="'+v+'" oninput="this.nextElementSibling.textContent=this.value">'+
      '<span class="sval">'+v+'</span></div>';
  }
  if(f.type==='checkbox'){
    return '<div style="padding-top:6px"><input type="checkbox" data-f="'+f.key+'" '+(val?'checked':'')+'></div>';
  }
  const type=f.type||'text';
  return '<input type="'+type+'" data-f="'+f.key+'" value="'+escapeHtml(val)+'" placeholder="'+escapeHtml(f.ph||f.label)+'">';
}
function readFieldVal(el, f){
  if(f.type==='checkbox') return el.checked;
  return el.value;
}

function renderCrudTable(rootId, cfg){
  const root=document.getElementById(rootId);
  if(!root) return;
  const data=Store.get(cfg.storeKey);
  const list=data[cfg.listPath];

  let html='';
  if(cfg.chartFields && cfg.chartFields.length){
    const sorted = list.slice().sort(function(a,b){ return (a[cfg.sortBy||'date']||'').localeCompare(b[cfg.sortBy||'date']||''); });
    html += '<div class="panel panel-pad section"><div class="grid-3">';
    cfg.chartFields.forEach(function(cf){
      const vals = sorted.slice(-14).map(function(r){return Number(r[cf.key]);}).filter(function(v){return !isNaN(v);});
      html += '<div><div class="kpi-label">'+escapeHtml(cf.label)+'</div>'+svgSparkline(vals,150,40,cf.color||'var(--teal)')+
        '<div class="faint mono" style="font-size:10.5px;margin-top:4px">'+(vals.length? 'last '+vals.length+' entries · latest '+vals[vals.length-1] : 'no data yet')+'</div></div>';
    });
    html += '</div></div>';
  }

  html += '<div class="panel inline-form"><div class="form-grid">';
  cfg.fields.forEach(function(f){
    if(f.hideInForm) return;
    html += '<div class="field'+(f.wide?' wide':'')+'"><label>'+escapeHtml(f.label)+'</label>'+fieldInputHtml(f, f.type==='date'&&f.defaultToday?todayISO():'')+'</div>';
  });
  html += '<button class="btn btn-primary" id="add-'+rootId+'" style="height:34px">'+ic('plus',14)+' '+(cfg.addLabel||'Add')+'</button>';
  html += '</div></div>';

  const displayList = cfg.sortBy ? list.slice().sort(function(a,b){
    if(cfg.sortRank){ return cfg.sortRank(a[cfg.sortBy])-cfg.sortRank(b[cfg.sortBy]); }
    const av=a[cfg.sortBy]||'', bv=b[cfg.sortBy]||'';
    return cfg.sortDesc ? bv.localeCompare(av) : av.localeCompare(bv);
  }) : list;

  if(!list.length){
    html += '<div class="empty"><b>'+escapeHtml(cfg.emptyTitle||'Nothing here yet')+'</b>'+escapeHtml(cfg.emptyBody||'Add your first entry above.')+'</div>';
  } else {
    html += '<div class="panel" style="overflow-x:auto"><table class="data"><thead><tr>';
    cfg.fields.forEach(function(f){ if(!f.hideInTable) html+='<th>'+escapeHtml(f.short||f.label)+'</th>'; });
    html += '<th></th></tr></thead><tbody>';
    displayList.forEach(function(row){
      html += '<tr data-id="'+row.id+'">';
      cfg.fields.forEach(function(f){
        if(f.hideInTable) return;
        const v=row[f.key];
        if(f.key===cfg.badgeField){
          html += '<td><span class="badge '+colorForStatus(v)+'">'+escapeHtml(v||'—')+'</span></td>';
        } else if(f.type==='date'){
          const dleft = v?daysUntil(v):null;
          html += '<td class="mono">'+(v?fmtDateShort(v):'—')+(cfg.showCountdown&&dleft!=null?' <span class="faint">('+(dleft>=0?dleft+'d':'past')+')</span>':'')+'</td>';
        } else if(f.type==='checkbox'){
          html += '<td>'+(v?ic('check',15):'<span class="faint">—</span>')+'</td>';
        } else if(f.type==='textarea'){
          html += '<td style="max-width:220px;white-space:normal;color:var(--text-dim)">'+escapeHtml(v||'—')+'</td>';
        } else {
          html += '<td>'+escapeHtml((v===0?'0':v)||'—')+'</td>';
        }
      });
      html += '<td class="row-actions"><button class="btn btn-icon btn-ghost" data-act="edit" title="Edit">'+ic('edit',14)+'</button><button class="btn btn-icon btn-ghost btn-danger" data-act="del" title="Delete">'+ic('trash',14)+'</button></td>';
      html += '</tr>';
    });
    html += '</tbody></table></div>';
  }
  root.innerHTML=html;

  const addBtn=document.getElementById('add-'+rootId);
  if(addBtn) addBtn.addEventListener('click', function(){
    const form=addBtn.closest('.inline-form');
    const rec={id:uid()};
    let hasAny=false;
    cfg.fields.forEach(function(f){
      if(f.hideInForm) return;
      const el=form.querySelector('[data-f="'+f.key+'"]');
      rec[f.key]=readFieldVal(el,f);
      if(rec[f.key]) hasAny=true;
    });
    if(!hasAny){ toast('Add at least one field','bad'); return; }
    list.push(rec);
    Store.save(cfg.storeKey,data);
    renderCrudTable(rootId,cfg);
    if(cfg.onChange) cfg.onChange();
    toast(cfg.addedMsg||'Added');
  });
  root.querySelectorAll('tr[data-id]').forEach(function(tr){
    const id=tr.getAttribute('data-id');
    const row=list.find(function(r){return r.id===id;});
    if(!row) return;
    const delBtn=tr.querySelector('[data-act="del"]');
    if(delBtn) delBtn.addEventListener('click', function(){
      if(!confirm('Delete this entry?')) return;
      list.splice(list.indexOf(row),1);
      Store.save(cfg.storeKey,data);
      renderCrudTable(rootId,cfg);
      if(cfg.onChange) cfg.onChange();
      toast('Deleted');
    });
    const editBtn=tr.querySelector('[data-act="edit"]');
    if(editBtn) editBtn.addEventListener('click', function(){
      openRecordModal(cfg.fields, row, function(){
        Store.save(cfg.storeKey,data);
        renderCrudTable(rootId,cfg);
        if(cfg.onChange) cfg.onChange();
        toast('Saved');
      }, cfg.editTitle||'Edit entry');
    });
  });
}

/* ---- cross-module computed stats, used by strip + dashboard insights ---- */
function computeStats(){
  const dw=Store.get('deepwork')||DEFAULTS.deepwork;
  const todayMins=sum((dw.sessions||[]).filter(function(s){return s.date===todayISO();}), function(s){return s.minutes;});
  const last7=(dw.sessions||[]).filter(function(s){ const d=daysUntil(s.date); return d!=null && d<=0 && d>-7; });
  const last7Mins=sum(last7,function(s){return s.minutes;});

  const fin=Store.get('finance')||DEFAULTS.finance;
  const gapMonths=monthsBetween(fin.settings.incomeSunset, fin.settings.targetEnrollment);

  const deadlines=[];
  const sa=Store.get('studyabroad')||DEFAULTS.studyabroad;
  (sa.rows||[]).forEach(function(r){ if(r.deadline) deadlines.push({label:r.university||r.country,date:r.deadline,src:'Study Abroad'}); });
  if(sa.examPrep && sa.examPrep.deadline) deadlines.push({label:'CEnT-S registration',date:sa.examPrep.deadline,src:'Study Abroad'});
  const uni=Store.get('university')||DEFAULTS.university;
  (uni.assignments||[]).forEach(function(a){ if(a.due) deadlines.push({label:a.title,date:a.due,src:'University'}); });
  const kb=Store.get('kanban')||DEFAULTS.kanban;
  (kb.cards||[]).forEach(function(c){ if(c.due) deadlines.push({label:c.title,date:c.due,src:'Kanban'}); });
  const cal=Store.get('calendar')||DEFAULTS.calendar;
  (cal.events||[]).forEach(function(e){ if(e.date) deadlines.push({label:e.title,date:e.date,src:'Calendar'}); });

  const upcoming=deadlines
    .map(function(d){ return Object.assign({},d,{days:daysUntil(d.date)}); })
    .filter(function(d){ return d.days!=null && d.days>=0; })
    .sort(function(a,b){ return a.days-b.days; });

  const health=Store.get('health')||DEFAULTS.health;
  const recentHealth=(health.logs||[]).slice().sort(function(a,b){return (b.date||'').localeCompare(a.date||'');}).slice(0,5);
  const avgSleep=avg(recentHealth,function(h){return Number(h.sleep)||0;});
  const avgEnergy=avg(recentHealth,function(h){return Number(h.energy)||0;});

  const projects=Store.get('projects')||DEFAULTS.projects;
  const zeroRevenueCount=(projects.list||[]).filter(function(p){
    const m=p.metrics||[]; const lastRev=m.length? Number(m[m.length-1].revenue)||0 : 0;
    return lastRev===0;
  }).length;

  return {todayMins,last7Mins,gapMonths,nearest:upcoming[0]||null,allUpcoming:upcoming,
    avgSleep,avgEnergy,recentHealthCount:recentHealth.length,
    projectCount:(projects.list||[]).length, zeroRevenueCount};
}

function renderStrip(){
  const s=computeStats();
  const root=document.getElementById('strip-items');
  if(!root) return;
  const dwGoal=240;
  const dwPct=clamp(s.todayMins/dwGoal*100,0,100);
  let html='';
  html+='<div class="strip-item"><span class="strip-dot '+(dwPct>=100?'':(dwPct>=40?'amber':'red'))+'"></span>Deep work <span class="strip-val">'+Math.floor(s.todayMins/60)+'h'+String(s.todayMins%60).padStart(2,'0')+'m</span><span class="dim">/4h</span></div>';
  html+='<span class="strip-sep">·</span>';
  if(s.nearest){
    html+='<div class="strip-item"><span class="strip-dot '+(s.nearest.days<=7?'red':(s.nearest.days<=21?'amber':''))+'"></span>'+escapeHtml(s.nearest.label)+' <span class="strip-val">'+s.nearest.days+'d</span></div>';
  } else {
    html+='<div class="strip-item dim">no upcoming deadlines logged</div>';
  }
  if(s.gapMonths!=null){
    html+='<span class="strip-sep">·</span><div class="strip-item"><span class="strip-dot amber"></span>income&rarr;enrollment gap <span class="strip-val">'+s.gapMonths+'mo</span></div>';
  }
  root.innerHTML=html;
}

function kpiCard(goKey,label,value,sub,pct,delay){
  return '<div class="panel kpi" data-go="'+goKey+'" style="animation-delay:'+((delay||0)*.05)+'s">'+
    '<div class="kpi-label">'+escapeHtml(label)+'</div>'+
    '<div class="kpi-value mono">'+value+'</div>'+
    (sub?'<div class="kpi-sub">'+escapeHtml(sub)+'</div>':'')+
    (pct!=null?'<div class="kpi-bar"><span style="width:'+pct+'%"></span></div>':'')+
    '</div>';
}
function buildInsights(s,fin,sa){
  const out=[];
  if(s.gapMonths!=null){
    out.push({kind:s.gapMonths>0?'warn':'good', icon:'warn',
      html:'<b>Income &rarr; enrollment gap: '+s.gapMonths+' months.</b> Searlo&rsquo;s data method sunsets '+fmtDate(fin.settings.incomeSunset)+', target enrollment is '+fmtDate(fin.settings.targetEnrollment)+'. Update either date in Finance if this has changed.'});
  }
  if(s.projectCount>0 && s.zeroRevenueCount>0){
    out.push({kind:'info', icon:'projects',
      html:'<b>'+s.zeroRevenueCount+' of '+s.projectCount+' projects</b> show $0 in their latest logged revenue. Log weekly numbers in Projects to track this over time.'});
  }
  if(s.nearest && s.nearest.days<=7){
    out.push({kind:'bad', icon:'flag',
      html:'<b>'+escapeHtml(s.nearest.label)+'</b> is due in '+s.nearest.days+' day'+(s.nearest.days===1?'':'s')+' &middot; '+escapeHtml(s.nearest.src)+'.'});
  }
  if(s.recentHealthCount>=3 && s.avgSleep>0 && s.avgSleep<6 && s.avgEnergy>0 && s.avgEnergy<=4){
    out.push({kind:'bad', icon:'health',
      html:'<b>Recovery signals are low.</b> Sleep has averaged '+s.avgSleep.toFixed(1)+'h and energy '+s.avgEnergy.toFixed(1)+'/10 over your last '+s.recentHealthCount+' health logs. Worth protecting sleep before pushing harder.'});
  }
  const ep=sa.examPrep;
  if(ep && ep.deadline){
    const d=daysUntil(ep.deadline);
    if(d!=null && d>=0 && d<=30){
      const doneCount=(ep.topics||[]).filter(function(t){return t.done;}).length;
      out.push({kind:d<=10?'bad':'warn', icon:'studyabroad',
        html:'<b>CEnT-S registration in '+d+' day'+(d===1?'':'s')+'.</b> '+doneCount+'/'+(ep.topics||[]).length+' prep topics marked done &mdash; priority order is Maths, then Reasoning, then Physics.'});
    }
  }
  return out;
}

    const dragging=container.querySelector('.dragging');
    if(!dragging) return;
    const after=getDragAfterElement(container,e.clientY);
    if(after==null) container.appendChild(dragging); else container.insertBefore(dragging,after);
  });
};
function getDragAfterElement(container,y){
  const els=Array.prototype.slice.call(container.querySelectorAll('.pblock:not(.dragging)'));
  return els.reduce(function(closest,el){
    const box=el.getBoundingClientRect();
    const offset=y-box.top-box.height/2;
    if(offset<0 && offset>closest.offset) return {offset:offset, element:el};
    return closest;
  }, {offset:-Infinity}).element;
}
function persistPlannerOrder(data){
  const ids=Array.prototype.slice.call(document.querySelectorAll('#pblocks .pblock')).map(function(el){return el.getAttribute('data-id');});
  const arr=data.days[plannerActiveDay];
  arr.sort(function(a,b){ return ids.indexOf(a.id)-ids.indexOf(b.id); });
  Store.save('planner',data);
}

   ============================================================ */
let timerState={running:false, remaining:25*60, total:25*60, project:'', interval:null};
function fmtClock(sec){ const m=Math.floor(sec/60), s=sec%60; return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0'); }
VIEW_RENDERERS.deepwork=function(root){
  const data=Store.get('deepwork'), proj=Store.get('projects');
  const sessions=data.sessions||[];
  const todayMins=sum(sessions.filter(function(s){return s.date===todayISO();}), function(s){return s.minutes;});

  const days=[], dayLabels=[];
  for(let i=6;i>=0;i--){
    const d=new Date(); d.setDate(d.getDate()-i);
    const iso=d.toISOString().slice(0,10);
    days.push(sum(sessions.filter(function(s){return s.date===iso;}), function(s){return s.minutes;}));
    dayLabels.push(d.toLocaleDateString('en-US',{weekday:'narrow'}));
  }
  let streak=0;
  for(let i=0;i<400;i++){
    const d=new Date(); d.setDate(d.getDate()-i);
    const iso=d.toISOString().slice(0,10);
    if(sessions.some(function(s){return s.date===iso;})) streak++; else break;
  }

  let html='<div class="view-head"><div><div class="view-title">Deep Work</div><div class="view-sub">Focus timer &middot; today '+Math.floor(todayMins/60)+'h'+String(todayMins%60).padStart(2,'0')+'m</div></div></div>';
  html+='<div class="grid-2">';
  html+='<div class="panel panel-pad" style="text-align:center">';
  html+='<div class="pill-select" id="tm-len" style="justify-content:center;margin-bottom:8px">'+[15,25,45,60].map(function(m){return '<span class="pill-opt'+(timerState.total/60===m?' on':'')+'" data-min="'+m+'">'+m+'m</span>';}).join('')+'</div>';
  if((proj.list||[]).length){
    html+='<select id="tm-project" style="margin:0 auto 6px;display:block;max-width:220px"><option value="">No project tag</option>'+
      proj.list.map(function(p){return '<option value="'+escapeHtml(p.name)+'" '+(timerState.project===p.name?'selected':'')+'>'+escapeHtml(p.name)+'</option>';}).join('')+'</select>';
  }
  html+='<div class="timer-ring">'+svgRing(100-(timerState.remaining/timerState.total*100),190,'var(--teal)',fmtClock(timerState.remaining))+'</div>';
  html+='<div class="flex gap-2" style="justify-content:center"><button class="btn btn-primary" id="tm-toggle">'+(timerState.running?ic('pause',15)+' Pause':ic('play',15)+' Start')+'</button><button class="btn" id="tm-reset">'+ic('reset',15)+' Reset</button></div>';
  html+='<div style="margin-top:14px"><button class="btn btn-ghost btn-sm" id="tm-manual">Log a past session manually</button></div>';
  html+='</div>';
  html+='<div class="panel panel-pad"><div class="section-title">Last 7 days (hours)</div>'+svgBars(days.map(function(m){return Math.round(m/60*10)/10;}),dayLabels,260,90,'var(--accent)');
  html+='<div class="grid-2" style="margin-top:16px"><div><div class="kpi-label">Streak</div><div class="kpi-value mono" style="font-size:20px">'+streak+'<span class="unit">day'+(streak===1?'':'s')+'</span></div></div>'+
    '<div><div class="kpi-label">All-time sessions</div><div class="kpi-value mono" style="font-size:20px">'+sessions.length+'</div></div></div></div>';
  html+='</div>';
  root.innerHTML=html;

  root.querySelectorAll('#tm-len [data-min]').forEach(function(el){
    el.addEventListener('click', function(){
      if(timerState.running) return;
      const m=Number(el.getAttribute('data-min'));
      timerState.total=m*60; timerState.remaining=m*60;
      VIEW_RENDERERS.deepwork(root);
    });
  });
  const projSel=document.getElementById('tm-project');
  if(projSel) projSel.addEventListener('change', function(){ timerState.project=projSel.value; });
  document.getElementById('tm-toggle').addEventListener('click', function(){ toggleTimer(root); });
  document.getElementById('tm-reset').addEventListener('click', function(){ resetTimer(root); });
  document.getElementById('tm-manual').addEventListener('click', function(){ openManualSessionModal(root); });
};
function toggleTimer(root){
  if(timerState.running){
    clearInterval(timerState.interval); timerState.running=false;
  } else {
    timerState.running=true;
    timerState.interval=setInterval(function(){
      timerState.remaining--;
      if(timerState.remaining<=0){
        clearInterval(timerState.interval); timerState.running=false;
        logSession(timerState.total/60, timerState.project);
        toast('Session complete — logged '+(timerState.total/60)+'m','good');
        timerState.remaining=timerState.total;
        if(currentView==='deepwork') VIEW_RENDERERS.deepwork(document.getElementById('view-root'));
        return;
      }
      if(currentView==='deepwork'){
        const label=document.querySelector('.ring-label');
        if(label) label.textContent=fmtClock(timerState.remaining);
        const circles=document.querySelectorAll('.timer-ring circle');
        if(circles[1]){
          const size=190, r=size/2-6, c=2*Math.PI*r, pct=100-(timerState.remaining/timerState.total*100);
          circles[1].setAttribute('stroke-dashoffset',(c-(pct/100)*c).toFixed(1));
        }
      }
    },1000);
  }
  VIEW_RENDERERS.deepwork(root);
}
function resetTimer(root){
  clearInterval(timerState.interval);
  timerState.running=false; timerState.remaining=timerState.total;
  VIEW_RENDERERS.deepwork(root);
}
function logSession(minutes, project){
  const data=Store.get('deepwork');
  data.sessions.push({id:uid(), date:todayISO(), minutes:minutes, project:project||''});
  Store.save('deepwork', data);
}

  html+='<div class="field"><label>Target enrollment</label><input type="date" id="fin-enroll" value="'+(st.targetEnrollment||'')+'"></div>';
  html+='</div></div>';

  html+='<div class="panel panel-pad section"><div class="section-title">Snapshot</div><div class="form-grid">';
  html+='<div class="field"><label>Current savings</label><input type="number" id="fin-savings" value="'+(st.currentSavings==null?'':st.currentSavings)+'"></div>';
  html+='<div class="field"><label>Avg monthly expense</label><input type="number" id="fin-expense" value="'+(st.avgMonthlyExpense==null?'':st.avgMonthlyExpense)+'"></div>';
  html+='<div class="field"><label>Emergency fund goal</label><input type="number" id="fin-efgoal" value="'+(st.emergencyFundGoal==null?'':st.emergencyFundGoal)+'"></div>';
  html+='<div class="field"><label>Tuition budget</label><input type="number" id="fin-tuition" value="'+(st.tuitionBudget==null?'':st.tuitionBudget)+'"></div>';
  html+='</div><div class="flex gap-3" style="margin-top:16px;align-items:center">'+svgRing(efPct,60,'var(--good)')+'<div class="dim" style="font-size:12px">Emergency fund progress<br>toward goal</div></div></div>';

  html+='<div class="section"><div class="section-title">Ledger</div><div id="fin-table"></div></div>';

      st.targetEnrollment=document.getElementById('fin-enroll').value;

/* ============================================================
   KANBAN
   ============================================================ */
VIEW_RENDERERS.kanban=function(root){
  const data=Store.get('kanban');
  const cards=data.cards||[];
  const proj=Store.get('projects');
  let html='<div class="view-head"><div><div class="view-title">Kanban</div><div class="view-sub">Drag cards between columns</div></div>'+
    '<button class="btn btn-primary" id="kb-add">'+ic('plus',14)+' Add card</button></div>';
  /* Cards carry an explicit `order` so a manual arrangement survives a reload.
     Anything created before this field existed sorts by its array position. */
  cards.forEach(function(c,i){ if(typeof c.order!=='number') c.order=i; });

  html+='<div class="kanban" id="kb-board">';
  KANBAN_COLS.forEach(function(col,ci){
    const colCards=cards.filter(function(c){return c.column===col;})
                        .sort(function(a,b){return a.order-b.order;});
    html+='<div class="kcol" data-col="'+escapeHtml(col)+'"><div class="kcol-head"><span>'+escapeHtml(col)+'</span><span class="mono">'+colCards.length+'</span></div><div class="kcol-body" data-col="'+escapeHtml(col)+'">';
    colCards.forEach(function(c){
      const dleft=c.due?daysUntil(c.due):null;
      html+='<div class="kcard" draggable="true" data-id="'+c.id+'" tabindex="0"><div class="ktitle">'+escapeHtml(c.title)+'</div><div class="kmeta">'+
        (c.project?'<span class="badge b-dim">'+escapeHtml(c.project)+'</span>':'')+
        (dleft!=null?'<span class="badge '+(dleft<=3?'b-bad':dleft<=10?'b-amber':'b-dim')+'">'+(dleft<0?Math.abs(dleft)+'d late':dleft+'d')+'</span>':'')+
        '<span class="kmove">'+
          '<button type="button" data-move="-1" title="Move left" aria-label="Move left"'+(ci===0?' disabled':'')+'>&#9664;</button>'+
          '<button type="button" data-move="1" title="Move right" aria-label="Move right"'+(ci===KANBAN_COLS.length-1?' disabled':'')+'>&#9654;</button>'+
        '</span></div></div>';
    });
    if(!colCards.length) html+='<div class="empty-col-hint">drop here</div>';
    html+='</div></div>';
  });
  html+='</div>';
  root.innerHTML=html;

  function commit(msg){
    Store.save('kanban',data);
    VIEW_RENDERERS.kanban(root);
    if(msg) toast(msg);
  }

  document.getElementById('kb-add').addEventListener('click', function(){ openKanbanCardModal(root,null,data,proj); });

  root.querySelectorAll('.kcard').forEach(function(el){
    /* A drag ends with a click event in some browsers; without this guard the
       edit modal pops open every time a card is dropped. */
    let dragged=false;
    el.addEventListener('click', function(e){
      if(e.target.closest('.kmove')) return;
      if(dragged){ dragged=false; return; }
      openKanbanCardModal(root, cards.find(function(x){return x.id===el.getAttribute('data-id');}), data, proj);
    });
    el.addEventListener('keydown', function(e){
      if(e.key==='Enter'){ e.preventDefault(); openKanbanCardModal(root, cards.find(function(x){return x.id===el.getAttribute('data-id');}), data, proj); }
    });
    el.addEventListener('dragstart', function(e){
      dragged=true;
      el.classList.add('dragging');
      if(e.dataTransfer){ e.dataTransfer.effectAllowed='move'; try{ e.dataTransfer.setData('text/plain', el.getAttribute('data-id')); }catch(_){} }
    });
    el.addEventListener('dragend', function(){ el.classList.remove('dragging'); });
  });

  /* Touch devices get no HTML5 drag-and-drop at all, so these buttons are the
     only way to move a card on a phone. */
  root.querySelectorAll('.kcard [data-move]').forEach(function(btn){
    btn.addEventListener('click', function(e){
      e.stopPropagation();
      const id=btn.closest('.kcard').getAttribute('data-id');
      const card=cards.find(function(c){return c.id===id;});
      const next=KANBAN_COLS.indexOf(card.column)+Number(btn.getAttribute('data-move'));
      if(next<0 || next>=KANBAN_COLS.length) return;
      card.column=KANBAN_COLS[next];
      card.order=Math.max(0, ...cards.map(function(c){return c.order||0;}))+1;
      commit('Moved to '+card.column);
    });
  });

  root.querySelectorAll('.kcol-body').forEach(function(body){
    body.addEventListener('dragover', function(e){
      e.preventDefault();
      if(e.dataTransfer) e.dataTransfer.dropEffect='move';
      body.closest('.kcol').classList.add('over');
      const dragging=document.querySelector('.kcard.dragging');
      if(!dragging) return;
      const hint=body.querySelector('.empty-col-hint');
      if(hint) hint.remove();
      const after=getKanbanAfterElement(body,e.clientY);
      if(after==null) body.appendChild(dragging); else body.insertBefore(dragging,after);
    });
    /* Moving across a child element fires dragleave on the parent too, which
       made the highlight strobe. Only clear it when the pointer really leaves. */
    body.addEventListener('dragleave', function(e){
      if(!body.contains(e.relatedTarget)) body.closest('.kcol').classList.remove('over');
    });
    body.addEventListener('drop', function(e){
      e.preventDefault();
      body.closest('.kcol').classList.remove('over');
      const dragging=document.querySelector('.kcard.dragging');
      if(!dragging) return;
      const targetCol=body.getAttribute('data-col');
      const card=cards.find(function(c){return c.id===dragging.getAttribute('data-id');});
      if(!card) return;
      card.column=targetCol;
      /* Read the order back off the DOM the drag just produced, otherwise the
         within-column position the user arranged is thrown away on re-render. */
      const idsInCol=Array.prototype.map.call(body.querySelectorAll('.kcard'), function(el){ return el.getAttribute('data-id'); });
      idsInCol.forEach(function(id,i){
        const c=cards.find(function(x){return x.id===id;});
        if(c){ c.column=targetCol; c.order=i; }
      });
      commit('Moved to '+targetCol);
    });
  });
};
function getKanbanAfterElement(container,y){
  const els=Array.prototype.slice.call(container.querySelectorAll('.kcard:not(.dragging)'));
  return els.reduce(function(closest,el){
    const box=el.getBoundingClientRect();
    const offset=y-box.top-box.height/2;
    if(offset<0 && offset>closest.offset) return {offset:offset, element:el};
    return closest;
  }, {offset:-Infinity}).element;
}
function openKanbanCardModal(root, card, data, proj){
  const isEdit=!!card;
  const rec=card||{id:uid(), column:'Backlog'};
  let html='<div class="modal-head"><h3>'+(isEdit?'Edit card':'Add card')+'</h3><button class="btn btn-icon btn-ghost" id="modal-close">'+ic('close',15)+'</button></div>';
  html+='<div style="display:flex;flex-direction:column;gap:12px">';
  html+='<div class="field"><label>Title</label><input type="text" id="kc-title" value="'+escapeHtml(rec.title||'')+'"></div>';
  html+='<div class="field"><label>Column</label><select id="kc-col">'+KANBAN_COLS.map(function(c){return '<option '+(rec.column===c?'selected':'')+'>'+c+'</option>';}).join('')+'</select></div>';
  html+='<div class="field"><label>Project / area</label><input type="text" id="kc-project" list="kc-proj-list" value="'+escapeHtml(rec.project||'')+'"><datalist id="kc-proj-list">'+(proj.list||[]).map(function(p){return '<option value="'+escapeHtml(p.name)+'">';}).join('')+'</datalist></div>';
  html+='<div class="field"><label>Due (optional)</label><input type="date" id="kc-due" value="'+(rec.due||'')+'"></div>';
  html+='<div class="field"><label>Note</label><textarea id="kc-note">'+escapeHtml(rec.note||'')+'</textarea></div>';
  html+='</div><div class="flex between" style="margin-top:16px">';
  html+= isEdit ? '<button class="btn btn-danger" id="kc-del">'+ic('trash',14)+' Delete</button>' : '<span></span>';
  html+='<div class="flex gap-2"><button class="btn" id="modal-cancel">Cancel</button><button class="btn btn-primary" id="modal-save">'+(isEdit?'Save':'Add card')+'</button></div></div>';
  openModal(html);
  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal-cancel').addEventListener('click', closeModal);
  if(isEdit) document.getElementById('kc-del').addEventListener('click', function(){
    if(!confirm('Delete this card?')) return;
    data.cards.splice(data.cards.indexOf(card),1);
    Store.save('kanban',data);
    closeModal();
    VIEW_RENDERERS.kanban(root);
    toast('Deleted');
  });
  document.getElementById('modal-save').addEventListener('click', function(){
    rec.title=document.getElementById('kc-title').value.trim();
    if(!rec.title){ toast('Title required','bad'); return; }
    rec.column=document.getElementById('kc-col').value;
    rec.project=document.getElementById('kc-project').value;
    rec.due=document.getElementById('kc-due').value;
    rec.note=document.getElementById('kc-note').value;
    if(!isEdit){
      /* New cards land at the bottom of their column rather than jumping to
         the top of the board on the next sort. */
      rec.order=Math.max(0, ...(data.cards||[]).map(function(c){return c.order||0;}))+1;
      data.cards.push(rec);
    }
    Store.save('kanban',data);
    closeModal();
    VIEW_RENDERERS.kanban(root);
    toast(isEdit?'Saved':'Card added');
  });
}

/* ============================================================
   CALENDAR — month grid, aggregates deadlines from every module
   ============================================================ */
let calMonth=new Date().getMonth(), calYear=new Date().getFullYear();
VIEW_RENDERERS.calendar=function(root){
  const data=Store.get('calendar');
  data.events=data.events||[];
  const events=aggregateAllEvents(data);
  const first=new Date(calYear,calMonth,1);
  const startDow=first.getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const daysInPrevMonth=new Date(calYear,calMonth,0).getDate();

  let html='<div class="view-head"><div><div class="view-title">Calendar</div><div class="view-sub">Deadlines pulled from every module, plus your own events</div></div>'+
    '<div class="flex gap-2"><button class="btn btn-icon" id="cal-prev">'+ic('chev',15)+'</button>'+
    '<span class="btn" style="min-width:130px;justify-content:center;pointer-events:none">'+first.toLocaleDateString('en-US',{month:'long',year:'numeric'})+'</span>'+
    '<button class="btn btn-icon" id="cal-next" style="transform:scaleX(-1)">'+ic('chev',15)+'</button>'+
    '<button class="btn btn-primary" id="cal-add">'+ic('plus',14)+' Add event</button></div></div>';

  html+='<div class="cal-grid">';
  ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(function(d){ html+='<div class="cal-dow">'+d+'</div>'; });
  const cells=[];
  for(let i=startDow-1;i>=0;i--) cells.push({d:daysInPrevMonth-i, other:true, iso:null});
  for(let d=1; d<=daysInMonth; d++) cells.push({d:d, other:false, iso:calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0')});
  while(cells.length%7!==0) cells.push({d:cells.length, other:true, iso:null});

  cells.forEach(function(cell){
    const isToday=cell.iso===todayISO();
    html+='<div class="cal-cell'+(cell.other?' other':'')+(isToday?' today':'')+'" '+(cell.iso?'data-date="'+cell.iso+'"':'')+'>';
    html+='<div class="cal-daynum">'+cell.d+'</div>';
    if(cell.iso){
      const dayEvts=events.filter(function(e){return e.date===cell.iso;});
      dayEvts.slice(0,3).forEach(function(e){ html+='<div class="cal-evt '+(e.color||'')+'" title="'+escapeHtml(e.title)+'">'+escapeHtml(e.title)+'</div>'; });
      if(dayEvts.length>3) html+='<div class="faint" style="font-size:9.5px">+'+(dayEvts.length-3)+' more</div>';
    }
    html+='</div>';
  });
  html+='</div>';
  root.innerHTML=html;

  document.getElementById('cal-prev').addEventListener('click', function(){ calMonth--; if(calMonth<0){calMonth=11;calYear--;} VIEW_RENDERERS.calendar(root); });
  document.getElementById('cal-next').addEventListener('click', function(){ calMonth++; if(calMonth>11){calMonth=0;calYear++;} VIEW_RENDERERS.calendar(root); });
  document.getElementById('cal-add').addEventListener('click', function(){ openCalEventModal(root,null,data,todayISO()); });
  root.querySelectorAll('.cal-cell[data-date]').forEach(function(cell){
    cell.addEventListener('click', function(){ openDayAgenda(root, cell.getAttribute('data-date'), events, data); });
  });
};
function aggregateAllEvents(calData){
  const out=[];
  (calData.events||[]).forEach(function(e){ out.push({date:e.date, title:e.title, color:'', src:'Calendar', id:e.id}); });
  const sa=Store.get('studyabroad');
  (sa.rows||[]).forEach(function(r){ if(r.deadline) out.push({date:r.deadline, title:r.university||r.country, color:'red', src:'Study Abroad'}); });
  if(sa.examPrep && sa.examPrep.deadline) out.push({date:sa.examPrep.deadline, title:'CEnT-S registration', color:'red', src:'Study Abroad'});
  const uni=Store.get('university');
  (uni.assignments||[]).forEach(function(a){ if(a.due) out.push({date:a.due, title:a.title, color:'teal', src:'University'}); });
  const kb=Store.get('kanban');
  (kb.cards||[]).forEach(function(c){ if(c.due) out.push({date:c.due, title:c.title, color:'', src:'Kanban'}); });
  return out;
}
function openDayAgenda(root, iso, events, calData){
  const dayEvts=events.filter(function(e){return e.date===iso;});
  let html='<div class="modal-head"><h3>'+fmtDate(iso)+'</h3><button class="btn btn-icon btn-ghost" id="modal-close">'+ic('close',15)+'</button></div>';
  html+= dayEvts.length ? dayEvts.map(function(e){ return '<div class="callout info" style="margin-bottom:8px"><span class="ic">'+ic('calendar',15)+'</span><div><b>'+escapeHtml(e.title)+'</b><div class="faint" style="font-size:11px">'+escapeHtml(e.src)+'</div></div></div>'; }).join('')
    : '<div class="empty"><b>Nothing scheduled</b>Add an event below.</div>';
  html+='<div class="flex gap-2" style="margin-top:14px;justify-content:flex-end"><button class="btn btn-primary" id="day-add">'+ic('plus',14)+' Add event this day</button></div>';
  openModal(html);
  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('day-add').addEventListener('click', function(){ openCalEventModal(root,null,calData,iso); });
}
function openCalEventModal(root, evt, calData, defaultDate){
  const isEdit=!!evt;
  const rec=evt||{id:uid(), date:defaultDate};
  let html='<div class="modal-head"><h3>'+(isEdit?'Edit event':'Add event')+'</h3><button class="btn btn-icon btn-ghost" id="modal-close">'+ic('close',15)+'</button></div>';
  html+='<div style="display:flex;flex-direction:column;gap:12px">';
  html+='<div class="field"><label>Title</label><input type="text" id="ce-title" value="'+escapeHtml(rec.title||'')+'"></div>';
  html+='<div class="field"><label>Date</label><input type="date" id="ce-date" value="'+(rec.date||defaultDate)+'"></div></div>';
  html+='<div class="flex gap-2" style="margin-top:16px;justify-content:flex-end"><button class="btn" id="modal-cancel">Cancel</button><button class="btn btn-primary" id="modal-save">Save</button></div>';
  openModal(html);
  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal-cancel').addEventListener('click', closeModal);
  document.getElementById('modal-save').addEventListener('click', function(){
    rec.title=document.getElementById('ce-title').value.trim();
    rec.date=document.getElementById('ce-date').value;
    if(!rec.title||!rec.date){ toast('Title and date required','bad'); return; }
    if(!isEdit) calData.events.push(rec);
    Store.save('calendar',calData);
    closeModal();
    VIEW_RENDERERS.calendar(root);
    toast('Saved');
  });
}

let journalSearch='';
VIEW_RENDERERS.journal=function(root){
  const data=Store.get('journal');
  const entries=(data.entries||[]).slice().sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
  const filtered=journalSearch? entries.filter(function(e){
    const q=journalSearch.toLowerCase();
    return (e.title||'').toLowerCase().indexOf(q)>=0 || (e.body||'').toLowerCase().indexOf(q)>=0 || (e.tags||'').toLowerCase().indexOf(q)>=0;
  }) : entries;

  let html='<div class="view-head"><div><div class="view-title">Journal</div><div class="view-sub">Freeform notes, searchable by text or tag</div></div>'+
    '<button class="btn btn-primary" id="jr-new">'+ic('plus',14)+' New entry</button></div>';
  html+='<div class="field" style="margin-bottom:16px;max-width:320px"><input type="text" id="jr-search" placeholder="Search entries or tags" value="'+escapeHtml(journalSearch)+'"></div>';

  html+= filtered.length ? filtered.map(function(e){
    return '<div class="panel journal-entry" data-id="'+e.id+'"><div class="flex between"><h4>'+escapeHtml(e.title||'Untitled')+'</h4><span class="faint mono" style="font-size:10.5px">'+fmtDate(e.date)+'</span></div>'+
      '<p>'+escapeHtml(e.body||'')+'</p>'+(e.tags?'<span class="journal-tag">#'+escapeHtml(e.tags.split(',').map(function(t){return t.trim();}).join(' #'))+'</span>':'')+'</div>';
  }).join('') : '<div class="empty"><b>'+(journalSearch?'No matches':'No entries yet')+'</b>'+(journalSearch?'Try a different search.':'Write your first entry above.')+'</div>';
  root.innerHTML=html;

  document.getElementById('jr-new').addEventListener('click', function(){ openJournalModal(root,null,data); });
  document.getElementById('jr-search').addEventListener('input', debounce(function(e){ journalSearch=e.target.value; VIEW_RENDERERS.journal(root); },250));
  root.querySelectorAll('.journal-entry').forEach(function(el){
    el.addEventListener('click', function(){ openJournalModal(root, entries.find(function(x){return x.id===el.getAttribute('data-id');}), data); });
  });
};
function openJournalModal(root, entry, data){
  const isEdit=!!entry;
  const rec=entry||{id:uid(), date:todayISO()};
  let html='<div class="modal-head"><h3>'+(isEdit?'Edit entry':'New entry')+'</h3><button class="btn btn-icon btn-ghost" id="modal-close">'+ic('close',15)+'</button></div>';
  html+='<div style="display:flex;flex-direction:column;gap:12px">';
  html+='<div class="field"><label>Date</label><input type="date" id="jm-date" value="'+(rec.date||todayISO())+'"></div>';
  html+='<div class="field"><label>Title</label><input type="text" id="jm-title" value="'+escapeHtml(rec.title||'')+'"></div>';
  html+='<div class="field"><label>Entry</label><textarea id="jm-body" style="min-height:180px">'+escapeHtml(rec.body||'')+'</textarea></div>';
  html+='<div class="field"><label>Tags (comma separated)</label><input type="text" id="jm-tags" value="'+escapeHtml(rec.tags||'')+'"></div>';
  html+='</div><div class="flex between" style="margin-top:16px">';
  html+= isEdit ? '<button class="btn btn-danger" id="jm-del">'+ic('trash',14)+' Delete</button>' : '<span></span>';
  html+='<div class="flex gap-2"><button class="btn" id="modal-cancel">Cancel</button><button class="btn btn-primary" id="modal-save">Save</button></div></div>';
  openModal(html);
  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal-cancel').addEventListener('click', closeModal);
  if(isEdit) document.getElementById('jm-del').addEventListener('click', function(){
    if(!confirm('Delete this entry?')) return;
    data.entries.splice(data.entries.indexOf(entry),1);
    Store.save('journal',data);
    closeModal(); VIEW_RENDERERS.journal(root); toast('Deleted');
  });
  document.getElementById('modal-save').addEventListener('click', function(){
    rec.date=document.getElementById('jm-date').value||todayISO();
    rec.title=document.getElementById('jm-title').value;
    rec.body=document.getElementById('jm-body').value;
    rec.tags=document.getElementById('jm-tags').value;
    if(!rec.body && !rec.title){ toast('Write something first','bad'); return; }
    if(!isEdit) data.entries.push(rec);
    Store.save('journal',data);
    closeModal(); VIEW_RENDERERS.journal(root); toast('Saved');
  });
}

/* ============================================================
   SETTINGS — export / import / reset
   ============================================================ */
VIEW_RENDERERS.settings=function(root){
  let html='<div class="view-head"><div><div class="view-title">Settings</div><div class="view-sub">Backup, restore, start over</div></div></div>';
  html+='<div class="panel panel-pad section"><div class="section-title">Backup</div>';
  html+='<div class="dim" style="font-size:12.5px;margin-bottom:14px">Everything lives in this artifact&rsquo;s storage. Export a copy if you want a portable backup.</div>';
  html+='<div class="flex gap-2 wrap"><button class="btn btn-primary" id="set-export">'+ic('export',14)+' Export all data (JSON)</button>'+
    '<label class="btn" for="set-import" style="cursor:pointer">'+ic('import',14)+' Import JSON</label><input type="file" id="set-import" accept="application/json" style="display:none"></div></div>';
  html+='<div class="panel panel-pad section"><div class="section-title">Reset</div><div class="dim" style="font-size:12.5px;margin-bottom:14px">Wipes every module back to empty. Cannot be undone — export first if unsure.</div>';
  html+='<button class="btn btn-danger" id="set-reset">'+ic('trash',14)+' Reset all data</button></div>';
  html+='<div class="panel panel-pad"><div class="section-title">About</div><div class="dim" style="font-size:12px;line-height:1.7">Single HTML file, no backend, no account, no tracking. Data is saved through this artifact&rsquo;s persistent storage. The Dashboard&rsquo;s insights are rule-based logic over your own logged numbers — not a live model call — so they keep working offline.</div></div>';
  root.innerHTML=html;
  document.getElementById('set-export').addEventListener('click', exportAllData);
  document.getElementById('set-import').addEventListener('change', function(e){ importAllData(e, root); });
  document.getElementById('set-reset').addEventListener('click', function(){ resetAllData(root); });
};
function exportAllData(){
  const out={};
  STORE_KEYS.forEach(function(k){ out[k]=Store.get(k); });
  out.__exportedAt=new Date().toISOString();
  const blob=new Blob([JSON.stringify(out,null,2)], {type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='founder-os-backup-'+todayISO()+'.json';
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  toast('Exported');
}
function importAllData(e, root){
  const file=e.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=async function(ev){
    try{
      const parsed=JSON.parse(ev.target.result);
      if(!confirm('Import will overwrite current data for any module present in this file. Continue?')) return;
      for(const k of STORE_KEYS){ if(parsed[k]!==undefined){ await Store.save(k, parsed[k]); } }
      toast('Imported','good');
      navigateTo('dashboard');
    }catch(err){ toast('Could not read that file','bad'); }
  };
  reader.readAsText(file);
  e.target.value='';
}
async function resetAllData(root){
  if(!confirm('This wipes every module back to empty. Export a backup first if you want one. Continue?')) return;
  if(!confirm('Really reset everything? This cannot be undone.')) return;
  for(const k of STORE_KEYS){ await Store.save(k, JSON.parse(JSON.stringify(DEFAULTS[k]))); }
  selectedProjectId=null;
  toast('All data reset','good');
  navigateTo('dashboard');
}

/* ============================================================
   BOOTSTRAP
   ============================================================ */
async function initApp(){
  await Promise.all(STORE_KEYS.map(function(k){ return Store.load(k, JSON.parse(JSON.stringify(DEFAULTS[k]))); }));

  /* Report the backend actually in use at boot. Previously the footer showed an
     optimistic hardcoded string until the first save proved otherwise. */
  setStorageIndicator(true);
  if(Backend.name === 'memory'){
    toast('This browser is blocking storage, so nothing will be saved. Export from Settings before you close the tab.','bad');
  }

  const meta=Store.get('meta')||{seeded:false};
  if(!meta.seeded){
    const overrides=getSeedOverrides();
    for(const k in overrides){
      const merged=Object.assign({}, Store.get(k), overrides[k]);
      await Store.save(k, merged);
    }
  }

  const hashKey=location.hash.replace('#/','');
  currentView = VIEW_RENDERERS[hashKey] ? hashKey : 'dashboard';
  renderSidebar();
  renderCurrentView();
}

document.getElementById('main').addEventListener('click', function(e){
  const sidebar=document.getElementById('sidebar');
  if(window.innerWidth<=880 && sidebar.classList.contains('open') && !document.getElementById('menu-btn').contains(e.target)){
    sidebar.classList.remove('open');
  }
});
document.getElementById('modal-root').addEventListener('click', function(e){ if(e.target.id==='modal-root') closeModal(); });

renderSidebar();
document.getElementById('view-root').innerHTML='<div class="empty" style="margin-top:60px"><b>Loading&hellip;</b>Reading your data from storage.</div>';
initApp();
</script>
